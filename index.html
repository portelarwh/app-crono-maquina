<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crono Máquina</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app" class="app" aria-live="polite">
    <section class="card" aria-label="Cronômetro da máquina atual">
      <h1>Crono Máquina</h1>
      <p class="subtitle">Controle de tempo para uma máquina por vez</p>

      <label for="machineName">Máquina / contexto</label>
      <input
        id="machineName"
        type="text"
        maxlength="80"
        placeholder="Ex.: Torno CNC 01"
        autocomplete="off"
      >
      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>

      <output class="timer" id="timerDisplay" aria-label="Tempo acumulado">00:00:00</output>
      <div class="status" id="statusDisplay">Parado</div>

      <div class="actions">
        <button id="startBtn" type="button">Iniciar</button>
        <button id="pauseBtn" type="button">Pausar</button>
        <button id="resetBtn" type="button" class="danger">Zerar</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
